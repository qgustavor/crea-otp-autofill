name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      # Package the Firefox extension as a .xpi file
      - name: Package Firefox extension
        run: |
          cd dist/extension
          zip -r ../crea-otp-autofill-firefox.xpi .
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/userscript/crea-otp-autofill.user.js
            dist/crea-otp-autofill-firefox.xpi
